<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUa6mY5m2P8+0pKsZ0MZ2V+vBUz60t9M8a5+G9e95HkuR6KefU1wKfsYGqZ8" crossorigin="anonymous">
    <style>
        .slide {
            display: none;
            animation: slideIn 0.5s forwards;
        }
        .slide.active {
            display: block;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container my-4">
    <h2 class="mb-4">New Customer</h2>
    <form id="customerForm">
        <div id="slide-1" class="slide active">
            <div class="mb-3">
                <label for="firstName" class="form-label">First Name*</label>
                <input type="text" class="form-control" id="firstName" required>
            </div>
            <div class="mb-3">
                <label for="lastName" class="form-label">Last Name*</label>
                <input type="text" class="form-control" id="lastName" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone">
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address">
            </div>
            <div class="mb-3">
                <label for="zip" class="form-label">ZIP Code</label>
                <input type="text" class="form-control" id="zip">
            </div>
            <button type="button" class="btn btn-primary" id="next-1">Next</button>
        </div>
        <div id="slide-2" class="slide">
            <div class="mb-3">
                <label for="company" class="form-label">Company Name</label>
                <input type="text" class="form-control" id="company">
            </div>
            <div class="mb-3">
                <label for="workAddress" class="form-label">Work Address</label>
                <input type="text" class="form-control" id="workAddress">
            </div>
            <div class="mb-3">
                <label for="years" class="form-label">Years Working</label>
                <input type="number" class="form-control" id="years">
            </div>
            <div class="mb-3">
                <label for="salary" class="form-label">Salary</label>
                <input type="number" class="form-control" id="salary">
            </div>
            <button type="button" class="btn btn-secondary me-2" id="back-2">Back</button>
            <button type="button" class="btn btn-primary" id="next-2">Next</button>
        </div>
        <div id="slide-3" class="slide">
            <h4 class="mb-3">Summary</h4>
            <ul class="list-group mb-3" id="summary"></ul>
            <button type="button" class="btn btn-secondary me-2" id="back-3">Back</button>
            <button type="submit" class="btn btn-success">Confirm</button>
        </div>
    </form>
</div>
<script>
    const slides = [
        document.getElementById('slide-1'),
        document.getElementById('slide-2'),
        document.getElementById('slide-3')
    ];
    let current = 0;
    function showSlide(index) {
        slides[current].classList.remove('active');
        current = index;
        slides[current].classList.add('active');
    }
    document.getElementById('next-1').addEventListener('click', () => {
        if (document.getElementById('customerForm').checkValidity()) {
            showSlide(1);
        } else {
            document.getElementById('customerForm').reportValidity();
        }
    });
    document.getElementById('back-2').addEventListener('click', () => showSlide(0));
    document.getElementById('next-2').addEventListener('click', () => {
        const summary = document.getElementById('summary');
        summary.innerHTML = '';
        const fields = ['firstName','lastName','email','phone','address','zip','company','workAddress','years','salary'];
        fields.forEach(id => {
            const value = document.getElementById(id).value;
            const label = document.querySelector(`label[for="${id}"]`).innerText;
            summary.innerHTML += `<li class="list-group-item"><strong>${label}:</strong> ${value || ''}</li>`;
        });
        showSlide(2);
    });
    document.getElementById('back-3').addEventListener('click', () => showSlide(1));
    document.getElementById('customerForm').addEventListener('submit', e => {
        e.preventDefault();
        alert('Customer saved!');
    });
</script>
</body>
</html>
